name: Deploy to GitHub Pages

# Publishes the static game by pushing it to the `gh-pages` branch. This
# classic approach works from a fork and from a non-default branch (no
# github-pages environment gate). After the first successful run, set
# Settings -> Pages -> "Deploy from a branch" -> gh-pages / root.
on:
  push:
    branches:
      - master
      - main
      - claude/determined-allen-imh8wa
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site (drop .git + heavy unused vector sources)
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_site' \
            --exclude='*.ai' \
            --exclude='*.cdr' \
            --exclude='*.eps' \
            ./ _site/
          touch _site/.nojekyll   # serve files as-is (no Jekyll processing)

      - name: Publish to gh-pages branch
        run: |
          cd _site
          git init -q
          git checkout -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy ${GITHUB_SHA} to GitHub Pages"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages:gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
